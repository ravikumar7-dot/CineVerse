{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My List | CineVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #080808;
            color: white;
        }

        .movie-card {
            height: 240px;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:hover {
            transform: scale(1.03);
            box-shadow: 0 18px 40px rgba(0,0,0,0.45);
        }

        .movie-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.08));
        }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto px-6 md:px-10 py-10">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-4xl font-extrabold text-red-600">My List</h1>
            <a href="{% url 'app:home' %}" class="bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20 transition">
                ← Back Home
            </a>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            {% for item in movies %}
                <div>
                    <a href="{% url 'app:movie' item.movie.uu_id %}" class="block movie-card"
                       style="background-image:url('{{ item.movie.image_card.url }}');">
                        <div class="absolute bottom-0 left-0 right-0 z-10 p-4">
                            <h3 class="font-bold text-lg">{{ item.movie.title }}</h3>
                            <p class="text-sm text-gray-300 mt-1">
                                {{ item.movie.release_date|date:"Y" }} • {{ item.movie.length }} min
                            </p>
                        </div>
                    </a>

                    <a href="{% url 'app:remove_from_list' item.movie.uu_id %}"
                       class="mt-3 inline-block text-red-500 hover:text-red-400 font-semibold">
                        Remove
                    </a>
                </div>
            {% empty %}
                <p class="text-gray-400">No movies in your list yet.</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
