{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Verify Mobile</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/login.css' %}" />
    <style>
        body {
            background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/a73c4363-1dcd-4719-b3b1-3725418fd91d/fe1147dd-78be-44aa-a0e5-2d2994305a13/IN-en-20231016-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        h5 { color: #e87c03; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="bg-image">
        <div class="signup-container">
            <h1>Verify Phone</h1>
            <h2 style="color: #b3b3b3;">We sent a 4-digit code to your mobile number. Please enter it below.</h2>
            
            <div>
                {% for message in messages %}
                <h5>{{message}}</h5>
                {% endfor %}
            </div>
            
            <form action="{% url 'app:verify_otp' %}" method="POST">
                {% csrf_token %}
                <input type="text" name="otp" placeholder="Enter 4-digit OTP" required maxlength="4" style="letter-spacing: 10px; text-align: center; font-size: 20px; font-weight: bold;" />
                <button style="color:white" type="submit" class="signup-btn">Verify & Start Watching</button>
            </form>
        </div>
    </div>
</body>
</html>
