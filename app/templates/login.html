{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CineVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.82)),
                        url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat fixed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">

    <div class="w-full max-w-md bg-black/70 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">
        <h1 class="text-4xl font-extrabold text-red-600 mb-2 text-center">CineVerse</h1>
        <p class="text-center text-gray-300 mb-8">Welcome back</p>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg bg-red-600/20 text-red-200 border border-red-500/30">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required
                   class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none text-white placeholder-gray-400">

            <input type="password" name="password" placeholder="Password" required
                   class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none text-white placeholder-gray-400">

            <button type="submit"
                    class="w-full bg-red-600 hover:bg-red-700 transition py-3 rounded-xl font-bold text-white shadow-lg">
                Login
            </button>
        </form>

        <p class="text-center text-gray-300 mt-6">
            Don’t have an account?
            <a href="{% url 'app:signup' %}" class="text-red-500 hover:text-red-400 font-semibold">Sign Up</a>
        </p>
    </div>

</body>
</html>
